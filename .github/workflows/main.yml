name: Build Panjtan APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: kivy/buildozer-action@master
        with:
          save_buildozer_config: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Panjtan-CS-APK
          path: bin/*.apk
